<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plano de Ação - Implementação GLPI</title>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        tech: {
                            bg: '#0f172a',
                            card: '#1e293b',
                            border: '#334155',
                            primary: '#0ea5e9',
                            primaryHover: '#0284c7',
                            success: '#10b981',
                            text: '#cbd5e1',
                            textHighlight: '#f8fafc'
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #cbd5e1; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* Checkbox styling */
        .tech-checkbox {
            appearance: none;
            background-color: transparent;
            margin: 0;
            font: inherit;
            color: currentColor;
            width: 1.25em;
            height: 1.25em;
            border: 2px solid #334155;
            border-radius: 0.25em;
            display: grid;
            place-content: center;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
        }
        .tech-checkbox::before {
            content: "";
            width: 0.65em;
            height: 0.65em;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em white;
            background-color: white;
            transform-origin: center;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }
        .tech-checkbox:checked {
            background-color: #10b981;
            border-color: #10b981;
        }
        .tech-checkbox:checked::before {
            transform: scale(1);
        }

        .gradient-border {
            position: relative;
            background: #1e293b;
            background-clip: padding-box;
            border: 2px solid transparent;
            border-radius: 0.75rem;
        }
        .gradient-border::before {
            content: '';
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            z-index: -1;
            margin: -2px;
            border-radius: inherit;
            background: linear-gradient(to right, #0ea5e9, #10b981);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

        // 🚨 ATENÇÃO - SEGURANÇA DA CHAVE DE API (AVISO DO GOOGLE) 🚨
        // Como o projeto está no GitHub Pages (público), a chave de API ficará visível no código HTML/JS.
        // Isso é o comportamento padrão de aplicativos Web com Firebase. 
        // A SOLUÇÃO CORRETA para evitar o alerta de abuso do Google Cloud é:
        // 1. Acesse: https://console.cloud.google.com/apis/credentials (com sua conta Google)
        // 2. Apague ou Regenere a chave que vazou (AIzaSyBMDQTs18MtvieRPliBV41xVKU8GPRfmsg).
        // 3. Edite a nova chave gerada. Em "Restrições do aplicativo", selecione "Referenciadores HTTP (sites da Web)".
        // 4. Adicione a URL do seu GitHub Pages (ex: *brunnorj.github.io/*)
        // Dessa forma, mesmo que a chave esteja pública no GitHub, ninguém conseguirá usá-la fora do seu site.
        
       const firebaseConfig = {
  apiKey: "AIzaSyBMDQTs18MtvieRPliBV41xVKU8GPRfmsg",
  authDomain: "glpi-dashboard.firebaseapp.com",
  databaseURL: "https://glpi-dashboard-default-rtdb.firebaseio.com",
  projectId: "glpi-dashboard",
  storageBucket: "glpi-dashboard.firebasestorage.app",
  messagingSenderId: "1060781939554",
  appId: "1:1060781939554:web:0a7b10af7a9b2ea8cc6a3b"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'glpi-dashboard-seiop';
        
        // Sanitiza o appId para remover caracteres inválidos do caminho do Realtime Database (., #, $, [, ])
        const sanitizedAppId = appId.replace(/[.#$\[\]]/g, '_');

        // Icons (Inline SVGs for performance and zero external dependencies)
        const CalendarIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;
        const ClockIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
        const UserIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>;
        const CheckCircleIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-tech-success"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
        const TargetIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>;
        const ChevronDownIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 12 15 18 9"></polyline></svg>;
        const ServerIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect><rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect><line x1="6" y1="6" x2="6.01" y2="6"></line><line x1="6" y1="18" x2="6.01" y2="18"></line></svg>;

        const data = {
            phases: [
                {
                    id: 1, title: "Fase 1 – Liberações e Preparação do Ambiente", steps: [
                        { id: "1-1", name: "Liberação de acesso ao servidor", desc: "Acessos administrativos" },
                        { id: "1-2", name: "Liberar meu IP no PRODERJ", desc: "Permitir acesso" },
                        { id: "1-3", name: "Criar VPN em meu nome", desc: "Conexão segura ao ambiente" },
                        { id: "1-4", name: "Atualização do Linux", desc: "Atualizar pacotes e segurança" },
                        { id: "1-5", name: "Atualização do MySQL", desc: "Garantir compatibilidade" },
                        { id: "1-6", name: "Criar banco, usuário e senha do GLPI", desc: "Preparação do banco de dados" }
                    ]
                },
                {
                    id: 2, title: "Fase 2 – Instalação do GLPI", steps: [
                        { id: "2-1", name: "Download do GLPI 11.0.4", desc: "Baixar versão estável" },
                        { id: "2-2", name: "Instalação do GLPI no servidor", desc: "Instalação da aplicação" },
                        { id: "2-3", name: "Configuração inicial do banco", desc: "Conectar GLPI ao banco" },
                        { id: "2-4", name: "Atualização do banco de dados", desc: "Rodar migrações necessárias" },
                        { id: "2-5", name: "Configuração do time zone", desc: "Ajustar fuso horário" },
                        { id: "2-6", name: "Configuração do calendário", desc: "Calendário de atendimento" },
                        { id: "2-7", name: "Configuração do cron", desc: "Automatizar tarefas do GLPI" },
                        { id: "2-8", name: "Testes iniciais do sistema", desc: "Verificar funcionamento" }
                    ]
                },
                {
                    id: 3, title: "Fase 3 – Integrações", steps: [
                        { id: "3-1", name: "Configuração LDAP", desc: "Integração com AD" },
                        { id: "3-2", name: "Teste de autenticação LDAP", desc: "Validar login de usuários" },
                        { id: "3-3", name: "Configurar o envio de e-mail SMTP", desc: "Configurar servidor de e-mail" },
                        { id: "3-4", name: "Configuração de destinatários", desc: "Definir recebimento de chamados" },
                        { id: "3-5", name: "Customização de e-mails", desc: "Templates de notificação" },
                        { id: "3-6", name: "Configurar autenticação em 2FA", desc: "Segurança adicional" },
                        { id: "3-7", name: "Criação de 02 E-mails Institucionais", desc: "Configurar Destinatário e Remetente" }
                    ]
                },
                {
                    id: 4, title: "Fase 4 – Estrutura do Sistema", steps: [
                        { id: "4-1", name: "Criação da entidade", desc: "Estrutura organizacional" },
                        { id: "4-2", name: "Edição de perfis e grupos", desc: "Controle de acesso" },
                        { id: "4-3", name: "Cadastro de localizações", desc: "Estrutura física" },
                        { id: "4-4", name: "Cadastro de categorias", desc: "Classificação de chamados" },
                        { id: "4-5", name: "Criação de categorias adicionais", desc: "Ajustes operacionais" },
                        { id: "4-6", name: "Criação de origens de requisição", desc: "Email, portal, telefone" },
                        { id: "4-7", name: "Configuração de assistência na entidade", desc: "Ajustar suporte" },
                        { id: "4-8", name: "Configurar o calendário de atendimento", desc: "SLA baseado em horário" }
                    ]
                },
                {
                    id: 5, title: "Fase 5 – Regras e Automação", steps: [
                        { id: "5-1", name: "Criação de SLA", desc: "Definir tempos de atendimento" },
                        { id: "5-2", name: "Regras de negócio para SLA", desc: "Aplicação automática" },
                        { id: "5-3", name: "Configuração de ações automáticas", desc: "Automação do sistema" },
                        { id: "5-4", name: "Configuração de pesquisa de satisfação", desc: "Feedback dos usuários" },
                        { id: "5-5", name: "Configuração de exportações", desc: "Relatórios e dados" },
                        { id: "5-6", name: "Configuração do painel (Dashboard)", desc: "Monitoramento de chamados" }
                    ]
                },
                {
                    id: 6, title: "Fase 6 – Usuários e Automação", steps: [
                        { id: "6-1", name: "Importação de usuários", desc: "Via LDAP ou CSV" },
                        { id: "6-2", name: "Criar regra de negócio para importação", desc: "Automatizar cadastro" },
                        { id: "6-3", name: "Criação manual de usuários específicos", desc: "Usuários administrativos" },
                        { id: "6-4", name: "Configuração de grupos", desc: "Estrutura de atendimento" },
                        { id: "6-5", name: "Criação de chamados pré-definidos", desc: "Modelos de chamados" },
                        { id: "6-6", name: "Criação de formulários", desc: "Portal de requisições" }
                    ]
                },
                {
                    id: 7, title: "Fase 7 – Customizações e Plugins", steps: [
                        { id: "7-1", name: "Criar a chave gratuita do marketplace", desc: "Acesso a plugins" },
                        { id: "7-2", name: "Instalação de plugins", desc: "Funcionalidades extras" },
                        { id: "7-3", name: "Customização da página inicial", desc: "Interface personalizada" },
                        { id: "7-4", name: "Customização de e-mails", desc: "Layout institucional" },
                        { id: "7-5", name: "Implementação do painel", desc: "Dashboard final" },
                        { id: "7-6", name: "Ajustes finais e testes", desc: "Validação completa" }
                    ]
                },
                {
                    id: 8, title: "Fase 8 – Validação Final", steps: [
                        { id: "8-1", name: "Teste completo do fluxo de chamados", desc: "Validação end-to-end" },
                        { id: "8-2", name: "Teste de SLA", desc: "Verificação de tempos" },
                        { id: "8-3", name: "Teste de envio de e-mail", desc: "Validação de comunicação" },
                        { id: "8-4", name: "Teste de autenticação LDAP", desc: "Segurança e login" },
                        { id: "8-5", name: "Teste de relatórios", desc: "Geração de dados" },
                        { id: "8-6", name: "Liberação para produção", desc: "Go-Live" }
                    ]
                }
            ],
            results: [
                "GLPI totalmente funcional",
                "Integração com LDAP",
                "Automação de chamados",
                "SLA funcionando",
                "Painel de gestão implementado",
                "Notificações por e-mail configuradas",
            "Portal de requisições estruturado"
        ]
    };

    const App = () => {
        const [user, setUser] = React.useState(null);
        const [syncStatus, setSyncStatus] = React.useState('Conectando nuvem...');
        const [completedSteps, setCompletedSteps] = React.useState(new Set());
        
        // Fases abertas (UI) continuam no localStorage pois é preferência visual de cada usuário localmente
        const [openPhases, setOpenPhases] = React.useState(() => {
            const saved = localStorage.getItem('glpi_open_phases');
            if (saved) {
                try { return new Set(JSON.parse(saved)); } catch (e) { return new Set([1]); }
            }
            return new Set([1]);
        });

        React.useEffect(() => {
            localStorage.setItem('glpi_open_phases', JSON.stringify(Array.from(openPhases)));
        }, [openPhases]);

        // 1. Inicializa Autenticação Anônima do Firebase
        React.useEffect(() => {
            const initAuth = async () => {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (error) {
                    console.error("Erro na autenticação:", error);
                    // Mostra o código de erro exato no badge de status para ajudar no debug
                    setSyncStatus(`Erro Auth: ${error.code || 'Desconhecido'}`);
                }
            };
            initAuth();
            const unsubscribe = onAuthStateChanged(auth, setUser);
            return () => unsubscribe();
        }, []);

        // 2. Escuta mudanças no banco de dados em tempo real
        React.useEffect(() => {
            if (!user) return;
            
            // O caminho dos dados na nuvem (Agora usando Realtime Database e sanitizedAppId)
            const dbRef = ref(db, `artifacts/${sanitizedAppId}/public/data/glpi_progress`);
            
            const unsubscribe = onValue(dbRef, (snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    if (data.completedSteps) {
                        setCompletedSteps(new Set(data.completedSteps));
                    }
                }
                setSyncStatus('Sincronizado na nuvem ☁️');
            }, (error) => {
                console.error("Erro ao ler dados:", error);
                setSyncStatus(`Erro leitura: ${error.code || 'Desconectado'}`);
            });

            return () => unsubscribe();
        }, [user]);

        const totalSteps = data.phases.reduce((acc, phase) => acc + phase.steps.length, 0);
        const progressPercentage = Math.round((completedSteps.size / totalSteps) * 100);

        const toggleStep = async (stepId) => {
            const newCompleted = new Set(completedSteps);
            if (newCompleted.has(stepId)) {
                newCompleted.delete(stepId);
            } else {
                newCompleted.add(stepId);
            }
            
            // Atualiza a tela imediatamente para não haver delay
            setCompletedSteps(newCompleted);

            // Salva na nuvem usando Realtime Database e sanitizedAppId
            if (user) {
                setSyncStatus('Salvando...');
                const dbRef = ref(db, `artifacts/${sanitizedAppId}/public/data/glpi_progress`);
                try {
                    await set(dbRef, {
                        completedSteps: Array.from(newCompleted),
                        updatedAt: new Date().toISOString()
                    });
                } catch (error) {
                    console.error("Erro ao salvar:", error);
                    setSyncStatus('Erro ao salvar');
                }
            } else {
                setSyncStatus('Erro: Precisa estar conectado');
            }
        };

        const togglePhase = (phaseId) => {
                const newOpen = new Set(openPhases);
                if (newOpen.has(phaseId)) {
                    newOpen.delete(phaseId);
                } else {
                    newOpen.add(phaseId);
                }
                setOpenPhases(newOpen);
            };

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-6xl mx-auto flex flex-col gap-8">
                    
                    {/* Header Section */}
                    <header className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 border-b border-tech-border pb-6">
                        <div>
                            <div className="flex items-center gap-3 mb-2">
                                <ServerIcon />
                                <span className="text-tech-primary font-semibold tracking-wider text-sm uppercase">Sistema de Chamados</span>
                            </div>
                            <h1 className="text-3xl md:text-4xl font-bold text-tech-textHighlight tracking-tight">
                            Plano de Ação: Implementação GLPI para SEIOP
                        </h1>
                        <div className="mt-3 inline-block px-3 py-1 bg-tech-card border border-tech-border rounded-full text-xs text-tech-primary font-medium shadow-sm">
                            Status: <span className="text-slate-300">{syncStatus}</span>
                        </div>
                    </div>
                    <div className="bg-tech-card p-4 rounded-xl border border-tech-border flex flex-col gap-3 min-w-[250px]">
                            <div className="flex items-center gap-3 text-sm">
                                <CalendarIcon />
                                <span><strong className="text-tech-textHighlight">Início:</strong> 16/03/2026</span>
                            </div>
                            <div className="flex items-center gap-3 text-sm">
                                <ClockIcon />
                                <span><strong className="text-tech-textHighlight">Prazo Estimado:</strong> 4 semanas</span>
                            </div>
                            <div className="flex items-center gap-3 text-sm text-tech-primary">
                                <UserIcon />
                                <span>Bruno Teixeira Sampaio (Analista)</span>
                            </div>
                        </div>
                    </header>

                    {/* Attention / Collaboration Banner */}
                    <section className="bg-tech-card border-l-4 border-tech-primary p-6 rounded-r-xl shadow-lg relative overflow-hidden">
                        <div className="absolute -right-10 -top-10 w-32 h-32 bg-tech-primary opacity-10 rounded-full blur-2xl"></div>
                        <h3 className="text-xl font-semibold text-tech-textHighlight mb-3 flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-tech-primary"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                            Requisito de Colaboração Presencial
                        </h3>
                        <p className="text-tech-text leading-relaxed mb-4">
                            Para garantir que o GLPI atenda plenamente às necessidades, será necessário contar com o apoio de <strong>um técnico da SEIOP disponível presencialmente pelo menos dois dias por semana</strong> durante a configuração.
                        </p>
                        <p className="text-sm text-slate-400">
                            Essa parceria acelera validações de decisões técnicas, ajusta funcionalidades aos processos internos e garante que o GLPI seja construído de forma aderente às rotinas da equipe.
                        </p>
                    </section>

                    {/* Global Progress Bar */}
                    <section className="bg-tech-card p-6 rounded-xl border border-tech-border sticky top-4 z-10 shadow-xl">
                        <div className="flex justify-between items-end mb-2">
                            <div>
                                <h2 className="text-lg font-semibold text-tech-textHighlight">Progresso da Implantação</h2>
                                <p className="text-sm text-slate-400">{completedSteps.size} de {totalSteps} tarefas concluídas</p>
                            </div>
                            <div className="text-2xl font-bold text-tech-primary">{progressPercentage}%</div>
                        </div>
                        <div className="w-full bg-tech-bg rounded-full h-3 overflow-hidden border border-tech-border">
                            <div 
                                className="bg-gradient-to-r from-tech-primary to-tech-success h-3 rounded-full transition-all duration-500 ease-out" 
                                style={{ width: `${progressPercentage}%` }}
                            ></div>
                        </div>
                    </section>

                    {/* Main Content Grid */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        
                        {/* Interactive Timeline/Phases */}
                        <div className="lg:col-span-2 flex flex-col gap-4">
                            <h2 className="text-2xl font-semibold text-tech-textHighlight mb-2">Cronograma de Execução</h2>
                            
                            {data.phases.map((phase) => {
                                const isPhaseOpen = openPhases.has(phase.id);
                                const phaseCompletedSteps = phase.steps.filter(s => completedSteps.has(s.id)).length;
                                const isPhaseComplete = phaseCompletedSteps === phase.steps.length;

                                return (
                                    <div key={phase.id} className={`bg-tech-card rounded-xl border transition-all duration-300 ${isPhaseOpen ? 'border-tech-primary/50 shadow-lg shadow-tech-primary/5' : 'border-tech-border hover:border-slate-500'}`}>
                                        
                                        {/* Phase Header */}
                                        <button 
                                            onClick={() => togglePhase(phase.id)}
                                            className="w-full p-5 flex items-center justify-between focus:outline-none group"
                                        >
                                            <div className="flex items-center gap-4 text-left">
                                                <div className={`w-10 h-10 rounded-lg flex items-center justify-center font-bold text-lg transition-colors ${isPhaseComplete ? 'bg-tech-success text-white' : 'bg-tech-bg border border-tech-border text-tech-text group-hover:border-tech-primary'}`}>
                                                    {isPhaseComplete ? '✓' : phase.id}
                                                </div>
                                                <div>
                                                    <h3 className={`font-semibold text-lg transition-colors ${isPhaseComplete ? 'text-tech-success' : 'text-tech-textHighlight'}`}>
                                                        {phase.title}
                                                    </h3>
                                                    <p className="text-xs text-slate-400 mt-1">
                                                        {phaseCompletedSteps} / {phase.steps.length} etapas concluídas
                                                    </p>
                                                </div>
                                            </div>
                                            <ChevronDownIcon className={`text-slate-400 transition-transform duration-300 ${isPhaseOpen ? 'rotate-180 text-tech-primary' : ''}`} />
                                        </button>

                                        {/* Phase Content (Steps) */}
                                        <div className={`overflow-hidden transition-all duration-300 ${isPhaseOpen ? 'max-h-[1000px] opacity-100' : 'max-h-0 opacity-0'}`}>
                                            <div className="p-5 pt-0 border-t border-tech-border/50 bg-tech-card/50">
                                                <ul className="mt-4 flex flex-col gap-3">
                                                    {phase.steps.map(step => (
                                                        <li key={step.id} 
                                                            className="flex items-start gap-4 p-3 rounded-lg hover:bg-tech-bg/50 transition-colors cursor-pointer"
                                                            onClick={() => toggleStep(step.id)}
                                                        >
                                                            <div className="mt-1">
                                                                <input 
                                                                    type="checkbox" 
                                                                    className="tech-checkbox" 
                                                                    checked={completedSteps.has(step.id)}
                                                                    onChange={() => {}} // Handled by li click
                                                                />
                                                            </div>
                                                            <div>
                                                                <p className={`font-medium transition-colors ${completedSteps.has(step.id) ? 'text-slate-400 line-through' : 'text-slate-200'}`}>
                                                                    {step.name}
                                                                </p>
                                                                {step.desc && (
                                                                    <p className="text-sm text-slate-500 mt-0.5">{step.desc}</p>
                                                                )}
                                                            </div>
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>

                        {/* Sidebar */}
                        <div className="flex flex-col gap-6">
                            
                            {/* Expected Results */}
                            <div className="bg-tech-card p-6 rounded-xl border border-tech-border">
                                <h3 className="text-lg font-semibold text-tech-textHighlight mb-4 flex items-center gap-2">
                                    <CheckCircleIcon />
                                    Resultado Esperado
                                </h3>
                                <ul className="flex flex-col gap-3">
                                    {data.results.map((res, index) => (
                                        <li key={index} className="flex items-center gap-3 text-sm text-slate-300 bg-tech-bg/50 p-3 rounded-lg border border-tech-border/50">
                                            <span className="text-tech-success">✔</span>
                                            {res}
                                        </li>
                                    ))}
                                </ul>
                            </div>

                            {/* Pro Tip */}
                            <div className="gradient-border">
                                <div className="p-6">
                                    <div className="flex items-center gap-3 mb-3 text-tech-primary">
                                        <TargetIcon />
                                        <h3 className="font-bold text-lg text-white tracking-wide">Dica Profissional</h3>
                                    </div>
                                    <div className="text-sm text-slate-300 space-y-3">
                                        <p>
                                            Em implantações de GLPI em órgãos públicos, o prazo médio costuma variar entre <strong className="text-white">30 e 45 dias</strong>.
                                        </p>
                                        <div className="bg-tech-bg p-3 rounded border border-tech-border/50 text-tech-primary font-medium">
                                            Meta estratégica: Reduzir esse prazo para até <span className="text-white text-base">20 dias</span>.
                                        </div>
                                        <p className="text-xs text-slate-400 leading-relaxed">
                                            Alcançado mediante planejamento estruturado, execução paralela de atividades e acompanhamento contínuo. Essa abordagem agiliza a ferramenta mantendo a segurança e boas práticas de TI.
                                        </p>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
