<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plano de Ação - Implementação GLPI SEIOP</title>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        corp: {
                            bg: '#f8fafc',       // slate-50
                            card: '#ffffff',     // white
                            border: '#e2e8f0',   // slate-200
                            primary: '#2563eb',  // blue-600
                            primaryHover: '#1d4ed8',// blue-700
                            success: '#059669',  // emerald-600
                            warning: '#d97706',  // amber-600
                            warningBg: '#fffbeb',// amber-50
                            text: '#475569',     // slate-600
                            title: '#0f172a'     // slate-900
                        }
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                    }
                }
            }
        }
    </script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
            color: #475569; 
            -webkit-font-smoothing: antialiased;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f8fafc; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Modern Checkbox styling */
        .corp-checkbox {
            appearance: none;
            background-color: #f1f5f9;
            margin: 0;
            font: inherit;
            color: currentColor;
            width: 1.4em;
            height: 1.4em;
            border: 2px solid #cbd5e1;
            border-radius: 0.35em;
            display: grid;
            place-content: center;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
        }
        .corp-checkbox::before {
            content: "";
            width: 0.75em;
            height: 0.75em;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em white;
            background-color: white;
            transform-origin: center;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }
        .corp-checkbox:checked {
            background-color: #059669;
            border-color: #059669;
        }
        .corp-checkbox:checked::before {
            transform: scale(1);
        }
        .corp-checkbox:hover:not(:checked) {
            border-color: #2563eb;
            background-color: #e0e7ff;
        }

        .timeline-line::before {
            content: '';
            position: absolute;
            top: 2rem;
            bottom: -2rem;
            left: 2.25rem;
            width: 2px;
            background: #e2e8f0;
            z-index: 0;
        }
        .timeline-item:last-child .timeline-line::before {
            display: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Icons
        const CalendarIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;
        const ClockIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
        const UserIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>;
        const CheckCircleIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-corp-success"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
        const TargetIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>;
        const ChevronDownIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 12 15 18 9"></polyline></svg>;
        const ServerIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect><rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect><line x1="6" y1="6" x2="6.01" y2="6"></line><line x1="6" y1="18" x2="6.01" y2="18"></line></svg>;
        const AlertIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-corp-warning"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>;

        const data = {
            phases: [
                {
                    id: 1, title: "Liberações e Preparação do Ambiente", steps: [
                        { id: "1-1", name: "Liberação de acesso ao servidor", desc: "Acessos administrativos" },
                        { id: "1-2", name: "Liberar meu IP no PRODERJ", desc: "Permitir acesso" },
                        { id: "1-3", name: "Criar VPN em meu nome", desc: "Conexão segura ao ambiente" },
                        { id: "1-4", name: "Atualização do Linux", desc: "Atualizar pacotes e segurança" },
                        { id: "1-5", name: "Atualização do MySQL", desc: "Garantir compatibilidade" },
                        { id: "1-6", name: "Criar banco, usuário e senha do GLPI", desc: "Preparação do banco de dados" }
                    ]
                },
                {
                    id: 2, title: "Instalação do GLPI", steps: [
                        { id: "2-1", name: "Download do GLPI 11.0.4", desc: "Baixar versão estável" },
                        { id: "2-2", name: "Instalação do GLPI no servidor", desc: "Instalação da aplicação" },
                        { id: "2-3", name: "Configuração inicial do banco", desc: "Conectar GLPI ao banco" },
                        { id: "2-4", name: "Atualização do banco de dados", desc: "Rodar migrações necessárias" },
                        { id: "2-5", name: "Configuração do time zone", desc: "Ajustar fuso horário" },
                        { id: "2-6", name: "Configuração do calendário", desc: "Calendário de atendimento" },
                        { id: "2-7", name: "Configuração do cron", desc: "Automatizar tarefas do GLPI" },
                        { id: "2-8", name: "Testes iniciais do sistema", desc: "Verificar funcionamento" }
                    ]
                },
                {
                    id: 3, title: "Integrações", steps: [
                        { id: "3-1", name: "Configuração LDAP", desc: "Integração com AD" },
                        { id: "3-2", name: "Teste de autenticação LDAP", desc: "Validar login de usuários" },
                        { id: "3-3", name: "Configurar o envio de e-mail SMTP", desc: "Configurar servidor de e-mail" },
                        { id: "3-4", name: "Configuração de destinatários", desc: "Definir recebimento de chamados" },
                        { id: "3-5", name: "Customização de e-mails", desc: "Templates de notificação" },
                        { id: "3-6", name: "Configurar autenticação em 2FA", desc: "Segurança adicional" },
                        { id: "3-7", name: "Criação de 02 E-mails Institucionais", desc: "Configurar Destinatário e Remetente" }
                    ]
                },
                {
                    id: 4, title: "Estrutura do Sistema", steps: [
                        { id: "4-1", name: "Criação da entidade", desc: "Estrutura organizacional" },
                        { id: "4-2", name: "Edição de perfis e grupos", desc: "Controle de acesso" },
                        { id: "4-3", name: "Cadastro de localizações", desc: "Estrutura física" },
                        { id: "4-4", name: "Cadastro de categorias", desc: "Classificação de chamados" },
                        { id: "4-5", name: "Criação de categorias adicionais", desc: "Ajustes operacionais" },
                        { id: "4-6", name: "Criação de origens de requisição", desc: "Email, portal, telefone" },
                        { id: "4-7", name: "Configuração de assistência na entidade", desc: "Ajustar suporte" },
                        { id: "4-8", name: "Configurar o calendário de atendimento", desc: "SLA baseado em horário" }
                    ]
                },
                {
                    id: 5, title: "Regras e Automação", steps: [
                        { id: "5-1", name: "Criação de SLA", desc: "Definir tempos de atendimento" },
                        { id: "5-2", name: "Regras de negócio para SLA", desc: "Aplicação automática" },
                        { id: "5-3", name: "Configuração de ações automáticas", desc: "Automação do sistema" },
                        { id: "5-4", name: "Configuração de pesquisa de satisfação", desc: "Feedback dos usuários" },
                        { id: "5-5", name: "Configuração de exportações", desc: "Relatórios e dados" },
                        { id: "5-6", name: "Configuração do painel (Dashboard)", desc: "Monitoramento de chamados" }
                    ]
                },
                {
                    id: 6, title: "Usuários e Automação", steps: [
                        { id: "6-1", name: "Importação de usuários", desc: "Via LDAP ou CSV" },
                        { id: "6-2", name: "Criar regra de negócio para importação", desc: "Automatizar cadastro" },
                        { id: "6-3", name: "Criação manual de usuários específicos", desc: "Usuários administrativos" },
                        { id: "6-4", name: "Configuração de grupos", desc: "Estrutura de atendimento" },
                        { id: "6-5", name: "Criação de chamados pré-definidos", desc: "Modelos de chamados" },
                        { id: "6-6", name: "Criação de formulários", desc: "Portal de requisições" }
                    ]
                },
                {
                    id: 7, title: "Customizações e Plugins", steps: [
                        { id: "7-1", name: "Criar a chave gratuita do marketplace", desc: "Acesso a plugins" },
                        { id: "7-2", name: "Instalação de plugins", desc: "Funcionalidades extras" },
                        { id: "7-3", name: "Customização da página inicial", desc: "Interface personalizada" },
                        { id: "7-4", name: "Customização de e-mails", desc: "Layout institucional" },
                        { id: "7-5", name: "Implementação do painel", desc: "Dashboard final" },
                        { id: "7-6", name: "Ajustes finais e testes", desc: "Validação completa" }
                    ]
                },
                {
                    id: 8, title: "Validação Final", steps: [
                        { id: "8-1", name: "Teste completo do fluxo de chamados", desc: "Validação end-to-end" },
                        { id: "8-2", name: "Teste de SLA", desc: "Verificação de tempos" },
                        { id: "8-3", name: "Teste de envio de e-mail", desc: "Validação de comunicação" },
                        { id: "8-4", name: "Teste de autenticação LDAP", desc: "Segurança e login" },
                        { id: "8-5", name: "Teste de relatórios", desc: "Geração de dados" },
                        { id: "8-6", name: "Liberação para produção", desc: "Go-Live" }
                    ]
                }
            ],
            results: [
                "GLPI totalmente funcional",
                "Integração com LDAP",
                "Automação de chamados",
                "SLA funcionando",
                "Painel de gestão implementado",
                "Notificações por e-mail configuradas",
                "Portal de requisições estruturado"
            ]
        };

        const App = () => {
            const [completedSteps, setCompletedSteps] = React.useState(new Set());
            const [openPhases, setOpenPhases] = React.useState(new Set([1])); 

            const totalSteps = data.phases.reduce((acc, phase) => acc + phase.steps.length, 0);
            const progressPercentage = Math.round((completedSteps.size / totalSteps) * 100);

            const toggleStep = (stepId) => {
                const newCompleted = new Set(completedSteps);
                if (newCompleted.has(stepId)) {
                    newCompleted.delete(stepId);
                } else {
                    newCompleted.add(stepId);
                }
                setCompletedSteps(newCompleted);
            };

            const togglePhase = (phaseId) => {
                const newOpen = new Set(openPhases);
                if (newOpen.has(phaseId)) {
                    newOpen.delete(phaseId);
                } else {
                    newOpen.add(phaseId);
                }
                setOpenPhases(newOpen);
            };

            return (
                <div className="min-h-screen flex flex-col font-sans text-corp-text bg-corp-bg">
                    
                    {/* Header Top Navbar */}
                    <header className="bg-corp-card border-b border-corp-border sticky top-0 z-50 shadow-sm">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <div className="w-12 h-12 bg-blue-50 text-corp-primary rounded-xl flex items-center justify-center border border-blue-100">
                                    <ServerIcon />
                                </div>
                                <div>
                                    <h1 className="text-xl md:text-2xl font-bold text-corp-title tracking-tight">
                                        Plano de Ação GLPI
                                    </h1>
                                    <p className="text-sm text-corp-text font-medium">Implementação para <span className="text-corp-primary font-bold">SEIOP</span></p>
                                </div>
                            </div>
                            
                            <div className="hidden md:flex items-center gap-6">
                                <div className="flex items-center gap-2 text-sm text-corp-text">
                                    <CalendarIcon />
                                    <span>Início: <strong className="text-corp-title">16/03/2026</strong></span>
                                </div>
                                <div className="flex items-center gap-2 text-sm text-corp-text">
                                    <ClockIcon />
                                    <span>Prazo: <strong className="text-corp-title">4 semanas</strong></span>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Main Content Area */}
                    <main className="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full flex flex-col gap-8">
                        
                        {/* Top Info Grid */}
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            
                            {/* Alert Banner */}
                            <div className="lg:col-span-2 bg-corp-warningBg border border-amber-200 p-6 rounded-2xl shadow-soft relative overflow-hidden flex flex-col justify-center">
                                <div className="absolute -right-4 -top-4 w-24 h-24 bg-amber-200 opacity-20 rounded-full blur-xl"></div>
                                <h3 className="text-lg font-bold text-corp-warning mb-2 flex items-center gap-2">
                                    <AlertIcon />
                                    Requisito de Colaboração Presencial
                                </h3>
                                <p className="text-corp-title leading-relaxed">
                                    Para garantir que o GLPI atenda plenamente às necessidades, será necessário contar com o apoio de <strong>um técnico da SEIOP disponível presencialmente pelo menos dois dias por semana</strong> durante a configuração.
                                </p>
                            </div>

                            {/* Progress Card */}
                            <div className="bg-corp-card p-6 rounded-2xl border border-corp-border shadow-soft flex flex-col justify-center">
                                <div className="flex justify-between items-end mb-4">
                                    <div>
                                        <h2 className="text-sm font-bold text-corp-text uppercase tracking-wider mb-1">Progresso Global</h2>
                                        <p className="text-2xl font-bold text-corp-title">{completedSteps.size} <span className="text-base font-normal text-slate-400">/ {totalSteps} tarefas</span></p>
                                    </div>
                                    <div className="text-3xl font-black text-corp-primary">{progressPercentage}%</div>
                                </div>
                                <div className="w-full bg-slate-100 rounded-full h-3 overflow-hidden border border-slate-200">
                                    <div 
                                        className="bg-corp-primary h-3 rounded-full transition-all duration-700 ease-out relative overflow-hidden" 
                                        style={{ width: `${progressPercentage}%` }}
                                    >
                                        <div className="absolute top-0 left-0 right-0 bottom-0 bg-white opacity-20" style={{ backgroundImage: 'linear-gradient(45deg, rgba(255,255,255,.15) 25%, transparent 25%, transparent 50%, rgba(255,255,255,.15) 50%, rgba(255,255,255,.15) 75%, transparent 75%, transparent)', backgroundSize: '1rem 1rem' }}></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Two Column Layout: Timeline & Sidebar */}
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            
                            {/* Timeline Column */}
                            <div className="lg:col-span-2">
                                <div className="mb-6 flex items-center justify-between">
                                    <h2 className="text-xl font-bold text-corp-title">Cronograma de Execução</h2>
                                    <span className="bg-blue-100 text-corp-primary text-xs font-bold px-3 py-1 rounded-full">8 Fases</span>
                                </div>
                                
                                <div className="relative">
                                    {data.phases.map((phase, index) => {
                                        const isPhaseOpen = openPhases.has(phase.id);
                                        const phaseCompletedSteps = phase.steps.filter(s => completedSteps.has(s.id)).length;
                                        const isPhaseComplete = phaseCompletedSteps === phase.steps.length;

                                        return (
                                            <div key={phase.id} className="timeline-item relative mb-6">
                                                <div className="timeline-line"></div>
                                                
                                                <div className={`bg-corp-card rounded-2xl border transition-all duration-300 shadow-sm z-10 relative ${isPhaseOpen ? 'border-corp-primary ring-1 ring-corp-primary/20' : 'border-corp-border hover:border-slate-300'}`}>
                                                    
                                                    {/* Phase Header */}
                                                    <button 
                                                        onClick={() => togglePhase(phase.id)}
                                                        className="w-full p-5 flex items-center justify-between focus:outline-none group"
                                                    >
                                                        <div className="flex items-center gap-5 text-left">
                                                            <div className={`w-12 h-12 rounded-xl flex items-center justify-center font-bold text-lg transition-colors shadow-sm ${isPhaseComplete ? 'bg-corp-success text-white' : 'bg-slate-100 border border-slate-200 text-corp-title group-hover:border-corp-primary/50 group-hover:bg-blue-50'}`}>
                                                                {isPhaseComplete ? '✓' : phase.id}
                                                            </div>
                                                            <div>
                                                                <h3 className={`font-bold text-lg transition-colors ${isPhaseComplete ? 'text-corp-success' : 'text-corp-title'}`}>
                                                                    {phase.title}
                                                                </h3>
                                                                <p className="text-sm text-slate-500 mt-0.5 font-medium">
                                                                    {phaseCompletedSteps} de {phase.steps.length} tarefas concluídas
                                                                </p>
                                                            </div>
                                                        </div>
                                                        <div className={`w-8 h-8 rounded-full flex items-center justify-center bg-slate-50 border border-slate-200 transition-transform duration-300 ${isPhaseOpen ? 'rotate-180 bg-blue-50 border-blue-200 text-corp-primary' : 'text-slate-400'}`}>
                                                            <ChevronDownIcon className="w-5 h-5" />
                                                        </div>
                                                    </button>

                                                    {/* Phase Content */}
                                                    <div className={`overflow-hidden transition-all duration-300 ease-in-out ${isPhaseOpen ? 'max-h-[1000px] opacity-100' : 'max-h-0 opacity-0'}`}>
                                                        <div className="p-2 pb-5 px-5">
                                                            <div className="bg-slate-50 rounded-xl border border-slate-100 p-2">
                                                                <ul className="flex flex-col">
                                                                    {phase.steps.map((step, idx) => (
                                                                        <li key={step.id} 
                                                                            className={`flex items-start gap-4 p-3 rounded-lg hover:bg-white transition-colors cursor-pointer ${idx !== phase.steps.length - 1 ? 'border-b border-slate-100/50' : ''}`}
                                                                            onClick={() => toggleStep(step.id)}
                                                                        >
                                                                            <div className="mt-0.5">
                                                                                <input 
                                                                                    type="checkbox" 
                                                                                    className="corp-checkbox" 
                                                                                    checked={completedSteps.has(step.id)}
                                                                                    onChange={() => {}} 
                                                                                />
                                                                            </div>
                                                                            <div className="flex-1">
                                                                                <p className={`font-semibold transition-colors ${completedSteps.has(step.id) ? 'text-slate-400 line-through' : 'text-corp-title'}`}>
                                                                                    {step.name}
                                                                                </p>
                                                                                {step.desc && (
                                                                                    <p className={`text-sm mt-0.5 ${completedSteps.has(step.id) ? 'text-slate-400' : 'text-slate-500'}`}>{step.desc}</p>
                                                                                )}
                                                                            </div>
                                                                        </li>
                                                                    ))}
                                                                </ul>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            {/* Sidebar Column */}
                            <div className="flex flex-col gap-6">
                                
                                {/* Info Block for Mobile (User Info) */}
                                <div className="md:hidden bg-corp-card p-5 rounded-2xl border border-corp-border shadow-soft flex items-center gap-4">
                                    <div className="w-10 h-10 bg-blue-100 text-corp-primary rounded-full flex items-center justify-center">
                                        <UserIcon />
                                    </div>
                                    <div>
                                        <p className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-0.5">Responsável</p>
                                        <p className="text-sm font-bold text-corp-title">Bruno Teixeira Sampaio</p>
                                    </div>
                                </div>

                                {/* Results Card */}
                                <div className="bg-corp-card p-6 rounded-2xl border border-corp-border shadow-soft">
                                    <h3 className="text-lg font-bold text-corp-title mb-5 flex items-center gap-2 border-b border-slate-100 pb-4">
                                        <CheckCircleIcon />
                                        Entregáveis Esperados
                                    </h3>
                                    <ul className="flex flex-col gap-3">
                                        {data.results.map((res, index) => (
                                            <li key={index} className="flex items-start gap-3 text-sm text-corp-text bg-slate-50 p-3 rounded-xl border border-slate-100">
                                                <span className="text-corp-success mt-0.5">
                                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                                                </span>
                                                <span className="font-medium">{res}</span>
                                            </li>
                                        ))}
                                    </ul>
                                </div>

                                {/* Pro Tip Card */}
                                <div className="bg-gradient-to-br from-corp-title to-slate-800 p-6 rounded-2xl shadow-lg text-white">
                                    <div className="flex items-center gap-3 mb-4 text-blue-300">
                                        <TargetIcon />
                                        <h3 className="font-bold text-lg tracking-wide">Dica Profissional</h3>
                                    </div>
                                    <div className="text-sm text-slate-300 space-y-4">
                                        <p className="leading-relaxed">
                                            Em implantações de GLPI em órgãos públicos, o prazo médio costuma variar entre <strong className="text-white">30 e 45 dias</strong>.
                                        </p>
                                        <div className="bg-white/10 p-4 rounded-xl border border-white/20 backdrop-blur-sm">
                                            <p className="text-blue-200 font-medium mb-1 text-xs uppercase tracking-wider">Meta Estratégica</p>
                                            <p className="font-bold text-xl text-white">Até 20 dias</p>
                                        </div>
                                        <p className="text-xs text-slate-400 leading-relaxed border-t border-white/10 pt-4">
                                            Alcançado mediante planejamento estruturado, execução paralela de atividades e acompanhamento contínuo.
                                        </p>
                                    </div>
                                </div>

                                {/* User Info (Desktop) */}
                                <div className="hidden md:flex bg-corp-card p-5 rounded-2xl border border-corp-border shadow-soft items-center gap-4">
                                    <div className="w-12 h-12 bg-blue-50 text-corp-primary rounded-full flex items-center justify-center border border-blue-100">
                                        <UserIcon />
                                    </div>
                                    <div>
                                        <p className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-0.5">Analista Responsável</p>
                                        <p className="text-base font-bold text-corp-title">Bruno Teixeira Sampaio</p>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
